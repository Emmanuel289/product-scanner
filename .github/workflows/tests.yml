name: "tests"

on:
    pull_request


jobs:
    run-tests:
        name: "Run tests"
        runs-on: "ubuntu-22.04"
        steps:
        - name: Checkout repository
          uses: actions/checkout@v3

        - uses: actions/setup-python@v5
          with:
            python-version: "3.13"

        - name: Install dependencies
          run: |
            pip install -r core/requirements.test.txt

        - name: Run unit tests
          run: pytest -s
